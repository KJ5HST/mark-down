name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Set up Apple certificate keychain
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          rm "$RUNNER_TEMP/certificate.p12"

      - name: Build Quick Look extension
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          TAURI_ARCH: ${{ contains(matrix.target, 'aarch64') && 'aarch64' || contains(matrix.target, 'x86_64') && 'x86_64' || '' }}
        run: bash scripts/build-quicklook.sh

      - name: Build Tauri app (macOS)
        if: runner.os == 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_ARCH: ${{ contains(matrix.target, 'aarch64') && 'aarch64' || contains(matrix.target, 'x86_64') && 'x86_64' || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mark Down ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles app

      - name: Patch Info.plist for Quick Look
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mark Down.app"
          bash scripts/patch-plist.sh "$APP_PATH"

      - name: Re-sign app after plist patch
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY != ''
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mark Down.app"
          # Sign appex first with its entitlements, then sign the outer app
          if [[ -d "$APP_PATH/Contents/PlugIns/MarkdownPreview.appex" ]]; then
            codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
              --entitlements QuickLookExtension/extension.entitlements \
              --options runtime --timestamp \
              "$APP_PATH/Contents/PlugIns/MarkdownPreview.appex"
          fi
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" \
            --options runtime --timestamp \
            "$APP_PATH"

      - name: Create DMG
        if: runner.os == 'macOS'
        env:
          TAURI_ARCH: ${{ contains(matrix.target, 'aarch64') && 'aarch64' || contains(matrix.target, 'x86_64') && 'x86_64' || '' }}
        run: bash scripts/create-dmg.sh "$TAURI_ARCH"

      - name: Upload DMG to release
        if: runner.os == 'macOS'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARCH=${{ contains(matrix.target, 'aarch64') && 'aarch64' || 'x86_64' }}
          DMG_PATH="src-tauri/target/${{ matrix.target }}/release/bundle/dmg/Mark Down_0.1.0_${ARCH}.dmg"
          gh release upload "${{ github.ref_name }}" "$DMG_PATH" --clobber

      - name: Build and release (non-macOS)
        if: runner.os != 'macOS'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Mark Down ${{ github.ref_name }}
          releaseBody: ''
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}
