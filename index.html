<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="/src/styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mark Down</title>
    <script type="module" src="/src/main.ts" defer></script>
  </head>

  <body>
    <div id="app">
      <div id="toolbar">
        <div id="toolbar-left">
          <span id="element-type">Paragraph</span>
          <span class="toolbar-separator"></span>
          <button id="btn-bold" class="toolbar-btn format-btn" title="Bold (Cmd+B)"><strong>B</strong></button>
          <button id="btn-italic" class="toolbar-btn format-btn" title="Italic (Cmd+I)"><em>I</em></button>
          <button id="btn-strike" class="toolbar-btn format-btn" title="Strikethrough (Cmd+Shift+X)"><s>S</s></button>
          <button id="btn-code" class="toolbar-btn format-btn" title="Code (Cmd+Shift+C)"><code>M</code></button>
        </div>
        <div id="toolbar-right">
          <select id="theme-picker" title="Theme">
            <option value="default">Default</option>
            <option value="dark">Dark</option>
            <option value="sepia">Sepia</option>
          </select>
          <span class="toolbar-separator"></span>
          <button id="btn-swap" class="toolbar-btn" title="Swap panes">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 5l-2.5 2.5L4 10" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><path d="M12 6l2.5 2.5L12 11" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/><line x1="1.5" y1="7.5" x2="14.5" y2="7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
            </button>
          <div id="view-toggle" class="btn-group">
            <button id="btn-view-editor" class="seg-btn" title="Editor only">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="4" y1="5.5" x2="12" y2="5.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="8" x2="10" y2="8" stroke="currentColor" stroke-width="1" stroke-linecap="round"/><line x1="4" y1="10.5" x2="8" y2="10.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>
            </button>
            <button id="btn-view-hsplit" class="seg-btn active" title="Split horizontal">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <button id="btn-view-vsplit" class="seg-btn" title="Split vertical">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><line x1="1" y1="8" x2="15" y2="8" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
            <button id="btn-view-preview" class="seg-btn" title="Preview only">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="1" y="2" width="14" height="12" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M8 6C6.9 6 6 6.9 6 8s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="currentColor"/><path d="M8 4.5C5 4.5 2.7 6.6 2 8c.7 1.4 3 3.5 6 3.5s5.3-2.1 6-3.5c-.7-1.4-3-3.5-6-3.5z" stroke="currentColor" stroke-width="1" fill="none"/></svg>
            </button>
          </div>
        </div>
      </div>
      <div id="workspace" class="view-hsplit">
        <div id="editor-pane"></div>
        <div id="divider"></div>
        <div id="preview-pane"></div>
      </div>
    </div>
  </body>
</html>
